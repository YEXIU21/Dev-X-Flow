services:
  - type: web
    name: devxflow-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromDatabase:
          name: devxflow-mongodb
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_PUBLIC_KEY
        sync: false
      - key: DESKTOP_API_KEY
        generateValue: true
    healthCheckPath: /api/health
    autoDeploy: true

  - type: static
    name: devxflow-frontend
    runtime: static
    buildCommand: echo "No build needed for static HTML"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /api/*
        destination: https://devxflow-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE
        value: https://devxflow-backend.onrender.com
